    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<body>

<!-- NAVBAR -->

<section>
    <div class="contacto-header">
        <h2>Contacto</h2>
        <p>¿Tienes alguna pregunta o comentario? ¡Nos encantaría saber de ti!</p>
    </div>

        <div class="contacto-form">

        <h3>Envíanos un Mensaje</h3>
        <form action="#" method="post">
            <div class="mb-3">
                <label for="name" class="form-label">Nombre</label>
                <input type="text" class="form-control" id="name" name="name" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Correo Electrónico</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>
            <div class="mb-3">
                <label for="message" class="form-label">Mensaje</label>
                <textarea class="form-control" id="message" name="message" rows="5" required></textarea>
            </div>
            <button type="submit" class="btn btn-primary">Enviar</button>
        </form>
    </div>

   <div class="contacto-info">
        <h3>Información de Contacto</h3>
        <p><i class="bi bi-geo-alt"></i> Dirección: Calle Principal 123, Ciudad</p>
        <p><i class="bi bi-telephone"></i> Teléfono: (123) 456-7890</p>
        <p><i class="bi bi-envelope"></i> Correo Electrónico: info@oliviaspanaderia.com</p>
    </div>

</section>



</body>
</html>
